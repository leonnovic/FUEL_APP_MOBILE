name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          # Update Capacitor versions to something that exists
          sed -i 's/"@capacitor\/android": ".*"/"@capacitor\/android": "^6.0.0"/' package.json
          sed -i 's/"@capacitor\/core": ".*"/"@capacitor\/core": "^6.0.0"/' package.json
          sed -i 's/"@capacitor\/cli": ".*"/"@capacitor\/cli": "^6.0.0"/' package.json
          npm install --legacy-peer-deps
      - name: Build
        run: cd frontend && npm run build
