# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# Frogbot Scan and Fix does the following:
# Automatically creates pull requests with fixes for vulnerable project dependencies.
# Uses JFrog Xray to scan the project.
# Read more about Frogbot here - https://docs.jfrog-applications.jfrog.io/jfrog-applications/frogbot

# SETUP REQUIRED:
# This workflow requires JFrog platform secrets to be configured.
# If you don't have a JFrog account, you can either:
# 1. Set up a free JFrog Cloud account and configure the secrets
# 2. Remove this workflow file if you don't need JFrog security scanning
#
# Required secrets:
# - JF_URL: Your JFrog platform URL (e.g., https://mycompany.jfrog.io/)
# - JF_ACCESS_TOKEN: JFrog access token with 'read' permissions on Xray

name: "Frogbot Scan and Fix"
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Allow manual triggering
permissions:
  contents: write
  pull-requests: write
  security-events: write
jobs:
  create-fix-pull-requests:
    runs-on: ubuntu-latest
    steps:
      - name: Check JFrog Configuration
        id: check-config
        run: |
          if [ -z "${{ secrets.JF_URL }}" ] || [ -z "${{ secrets.JF_ACCESS_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::JFrog secrets (JF_URL and JF_ACCESS_TOKEN) are not configured. Skipping Frogbot scan."
            echo "To enable Frogbot scanning:"
            echo "1. Create a JFrog account at https://jfrog.com/start-free/"
            echo "2. Add JF_URL and JF_ACCESS_TOKEN secrets to this repository"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check-config.outputs.configured == 'true'

      - uses: jfrog/frogbot@5d9c42c30f1169d8be4ba5510b40e75ffcbbc2a9  # v2.21.2
        if: steps.check-config.outputs.configured == 'true'
        env:
          # [Mandatory]
          # JFrog platform URL
          JF_URL: ${{ secrets.JF_URL }}

          # [Mandatory if JF_USER and JF_PASSWORD are not provided]
          # JFrog access token with 'read' permissions on Xray service
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

          # [Mandatory]
          # The GitHub token automatically generated for the job
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
