name: Cloudflare Worker CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/worker/**'
      - 'wrangler.toml'
      - 'frontend/wrangler.json'
      - '.github/workflows/cloudflare-worker-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/worker/**'
      - 'wrangler.toml'
      - 'frontend/wrangler.json'

jobs:
  worker-typecheck:
    name: Worker TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          ELECTRON_BUILDER_SKIP_PUBLISH: '1'
        run: npm ci --legacy-peer-deps

      - name: TypeScript check (includes worker)
        run: npx tsc --noEmit

      - name: Verify worker entry point exists
        run: |
          if [ ! -f "src/worker/index.ts" ]; then
            echo "ERROR: src/worker/index.ts is missing — Cloudflare will fail to build"
            exit 1
          fi
          echo "✓ src/worker/index.ts exists"

      - name: Validate wrangler.toml (root)
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            // wrangler.toml is TOML format, not JSON — check required keys by string matching
            const content = fs.readFileSync(path.join('..', 'wrangler.toml'), 'utf8');
            const required = ['name', 'main', 'assets', 'build'];
            const missing = required.filter(k => {
              const re = new RegExp('\\\\b' + k + '\\\\s*[=\\\\[]');
              return !re.test(content);
            });
            if (missing.length) {
              console.error('wrangler.toml missing required fields:', missing.join(', '));
              process.exit(1);
            }
            console.log('✓ wrangler.toml contains all required fields:', required.join(', '));
          "
