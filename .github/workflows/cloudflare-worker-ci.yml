name: Cloudflare Worker CI

on:
  push:
    paths:
      - 'frontend/src/worker/**'
      - 'wrangler.jsonc'
      - 'frontend/wrangler.json'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check entry point
        run: test -f frontend/src/worker/index.ts
      - name: Validate wrangler.jsonc
        run: |
          test -f wrangler.jsonc
          grep '"name":' wrangler.jsonc
          grep '"main":' wrangler.jsonc
