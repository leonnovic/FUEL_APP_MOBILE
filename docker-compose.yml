# FuelPro Docker Compose Configuration
# Production-ready with Nginx, PostgreSQL, Redis

version: '3.8'

services:
  # ─── Frontend App ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fuelpro-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://fuelpro:${POSTGRES_PASSWORD}@postgres:5432/fuelpro
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - API_BASE_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fuelpro-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: fuelpro-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - fuelpro-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: fuelpro-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fuelpro
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=fuelpro
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/backups:/backups
    ports:
      - "5432:5432"
    networks:
      - fuelpro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelpro -d fuelpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ───
  redis:
    image: redis:7-alpine
    container_name: fuelpro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - fuelpro-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Watchtower (Auto-updates) ───
  watchtower:
    image: containrrr/watchtower
    container_name: fuelpro-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=true
      - WATCHTOWER_POLL_INTERVAL=3600
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - fuelpro-network

networks:
  fuelpro-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-logs:
    driver: local