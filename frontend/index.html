<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <!-- Mobile viewport with safe-area support for notched devices (iOS 11.2+) -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <!-- Open Graph & Twitter Meta Tags for Social Sharing -->
    <meta property="og:title" content="FuelPro - Fuel Management System"/>
    <meta property="og:description" content="Professional fuel distribution and payment management system"/>
    <meta property="og:image" content="https://mocha-cdn.com/0199d39d-8fc8-7b37-bf10-097a162ee9f3/QRRR.jpg" type="image/jpeg"/>
    <meta property="og:url" content="https://fuelpro.mocha.app"/>
    <meta property="og:type" content="website"/>
    <meta property="og:author" content="FuelPro"/>
    <meta property="og:site_name" content="FuelPro - Fuel Management System"/>
    <meta property="twitter:card" content="summary_large_image"/>
    <meta property="twitter:site" content="@get_mocha"/>
    <meta property="twitter:title" content="FuelPro - Fuel Management System"/>
    <meta property="twitter:description" content="Professional fuel distribution and payment management system"/>
    <meta property="twitter:image" content="https://mocha-cdn.com/0199d39d-8fc8-7b37-bf10-097a162ee9f3/QRRR.jpg" type="image/jpeg"/>
    <!-- PWA & Icons -->
    <link rel="shortcut icon" href="/logo-small.png" type="image/png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-main.png" type="image/png"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#f59e0b"/>
    <!-- iOS Web App Configuration -->
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="FuelPro"/>
    <!-- Windows Tile Icons -->
    <meta name="msapplication-TileImage" content="/logo-main.png"/>
    <meta name="msapplication-TileColor" content="#f59e0b"/>
    <!-- Security Headers (enforced server-side, but set here for clarity) -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <meta name="referrer" content="strict-origin-when-cross-origin"/>
    <title>FuelPro - Fuel Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/react-app/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Auto-check for app updates every 30 minutes
            setInterval(() => { try { reg.update(); } catch (e) {} }, 30 * 60 * 1000);
            // When a new SW is waiting, prompt to refresh
            reg.addEventListener('updatefound', () => {
              const next = reg.installing;
              if (!next) return;
              next.addEventListener('statechange', () => {
                if (next.state === 'installed' && navigator.serviceWorker.controller) {
                  // Dispatch a custom event so React can show an "Update available" toast
                  window.dispatchEvent(new CustomEvent('fuelpro:update-ready', { detail: reg }));
                }
              });
            });
          }).catch(() => {});
        });
        // Reload once when a new SW takes control
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      }
      // Detect offline state and notify user
      window.addEventListener('offline', () => {
        window.dispatchEvent(new CustomEvent('fuelpro:offline', { detail: true }));
      });
      window.addEventListener('online', () => {
        window.dispatchEvent(new CustomEvent('fuelpro:online', { detail: true }));
      });
    </script>
  </body>
</html>
