<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FuelPro - Fuel Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css" rel="stylesheet"/>
<style>
:root {
  --primary: #1a3a5f;
  --secondary: #d4af37;
  --accent: #2980b9;
  --bg: #111827;
  --bg2: #1f2937;
  --bg3: #374151;
  --card: #1f2937;
  --border: #374151;
  --text: #f3f4f6;
  --text2: #9ca3af;
  --text3: #6b7280;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --teal: #14b8a6;
  --shadow: 0 8px 30px rgba(0,0,0,0.4);
  --radius: 12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 20%,rgba(212,175,55,.08) 0%,transparent 60%),radial-gradient(circle at 80% 80%,rgba(41,128,185,.06) 0%,transparent 60%);z-index:0;pointer-events:none}
#app{position:relative;z-index:1}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* HEADER */
.header{position:sticky;top:0;z-index:50;background:rgba(17,24,39,.95);backdrop-filter:blur(12px);border-bottom:2px solid var(--secondary);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:12px;flex-wrap:wrap}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{width:48px;height:48px;background:linear-gradient(135deg,#3b82f6,#1a3a5f);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--secondary)}
.header-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:#93c5fd;line-height:1.1}
.header-sub{font-size:.7rem;color:var(--secondary);font-weight:500}
.header-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.h-btn{padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.75rem;font-weight:500;display:flex;align-items:center;gap:6px;transition:all .2s}
.h-btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.h-btn-outline:hover{background:var(--bg3);color:var(--text)}
.h-btn-primary{background:var(--blue);color:#fff}
.h-btn-primary:hover{background:#2563eb}
.h-btn-danger{background:transparent;border:1px solid #7f1d1d;color:#f87171}
.h-btn-danger:hover{background:rgba(239,68,68,.1)}
.cloud-status{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:.7rem;color:var(--text2)}
.cloud-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.user-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:.75rem;color:var(--text2)}
.user-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff}

/* STATION SELECTOR */
.station-badge{display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.4);border-radius:8px;cursor:pointer;font-size:.75rem;color:#fbbf24;font-weight:600;transition:all .2s}
.station-badge:hover{background:rgba(245,158,11,.15)}

/* TAB NAV */
.tab-nav{background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;scrollbar-width:thin}
.tab-nav::-webkit-scrollbar{height:4px}
.tab-nav-inner{display:flex;padding:8px 12px;gap:4px;min-width:max-content}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:var(--text3);font-family:'Poppins',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:6px;transition:all .25s;border-bottom:3px solid transparent;white-space:nowrap}
.tab-btn:hover{color:var(--text2);background:var(--bg3)}
.tab-btn.active{color:#fbbf24;background:rgba(212,175,55,.12);border-bottom-color:#fbbf24}
.tab-icon{font-size:1rem}

/* MAIN */
.main{padding:20px;max-width:1400px;margin:0 auto}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:1rem;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.section-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:#93c5fd;margin-bottom:16px}

/* METRIC CARDS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.metric-card{border-radius:var(--radius);padding:20px;color:#fff;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1)}
.metric-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;opacity:.8;margin-bottom:6px}
.metric-value{font-size:2rem;font-weight:700;line-height:1}
.metric-sub{font-size:.7rem;opacity:.7;margin-top:4px}
.metric-footer{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.2);font-size:.7rem;display:flex;justify-content:space-between}
.mc-green{background:linear-gradient(135deg,#059669,#10b981)}
.mc-blue{background:linear-gradient(135deg,#2563eb,#06b6d4)}
.mc-teal{background:linear-gradient(135deg,#0f766e,#14b8a6)}
.mc-amber{background:linear-gradient(135deg,#d97706,#f59e0b)}
.mc-purple{background:linear-gradient(135deg,#7c3aed,#8b5cf6)}
.mc-red{background:linear-gradient(135deg,#dc2626,#ef4444)}
.mc-gray{background:linear-gradient(135deg,#4b5563,#6b7280)}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-size:.8rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .2s;min-height:36px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#2563eb;transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);color:var(--text)}
.btn-secondary:hover{background:#4b5563}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#059669}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-amber{background:var(--amber);color:#000}
.btn-amber:hover{background:#d97706}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{background:var(--bg3);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:.72rem;min-height:28px}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{display:block;margin-bottom:5px;font-size:.78rem;font-weight:600;color:var(--text2)}
.form-input{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Poppins',sans-serif;font-size:.85rem;transition:border .2s}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg2)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead{background:var(--bg3)}
th{padding:10px 14px;text-align:left;font-weight:600;color:var(--text2);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:10px 14px;border-top:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.td-input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:.8rem;width:100%;min-width:80px}
.td-input:focus{outline:none;border-color:var(--blue)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:.7rem;font-weight:600}
.badge-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
.badge-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.badge-amber{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
.badge-blue{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}

/* TANK BAR */
.tank-bar{height:28px;background:var(--bg3);border-radius:100px;overflow:hidden;position:relative;margin-top:8px}
.tank-fill{height:100%;border-radius:100px;transition:width 1s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:10px}
.tank-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5)}

/* QUICK ACTIONS */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.quick-btn{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .25s;text-align:center}
.quick-btn:hover{border-color:var(--blue);background:var(--bg3);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.quick-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
.quick-label{font-size:.78rem;font-weight:600;color:var(--text)}
.quick-desc{font-size:.68rem;color:var(--text3)}

/* TREND BAR */
.trend-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.trend-date{width:60px;font-size:.72rem;color:var(--text3);flex-shrink:0}
.trend-bar-wrap{flex:1;height:24px;background:var(--bg3);border-radius:100px;overflow:hidden}
.trend-bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;transition:width .8s ease}
.trend-val{font-size:.68rem;font-weight:600;color:var(--text2);width:80px;text-align:right;flex-shrink:0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.modal-close{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:1.2rem;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.modal-close:hover{background:var(--bg3);color:var(--text)}

/* TABS PANEL */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* HISTORY LIST */
.history-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:.82rem}
.history-item:hover{border-color:var(--blue)}

/* PAYROLL / EMPLOYEE */
.employee-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.emp-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.9rem;flex-shrink:0}

/* POS */
.pos-grid{display:grid;grid-template-columns:1fr 340px;gap:20px}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.cart-qty{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s}
.qty-btn:hover{background:var(--blue);border-color:var(--blue)}

/* MPESA */
.mpesa-stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.mpesa-val{font-size:1.4rem;font-weight:700;margin:4px 0}

/* PAYWALL */
.paywall{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.paywall-card{max-width:500px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px;text-align:center;box-shadow:var(--shadow)}
.plan-card{border:2px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;margin-bottom:12px;text-align:left}
.plan-card.selected{border-color:var(--blue);background:rgba(59,130,246,.08)}
.plan-card:hover{border-color:var(--text3)}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%)}
.login-inner{max-width:900px;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.login-card{background:rgba(31,41,55,.9);border:1px solid var(--border);border-radius:20px;padding:36px;backdrop-filter:blur(12px)}
.google-btn{width:100%;padding:14px;background:#fff;color:#374151;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;box-shadow:0 4px 15px rgba(0,0,0,.2)}
.google-btn:hover{background:#f9fafb;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.feature-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.feature-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}

/* ALERTS */
.alert{padding:12px 16px;border-radius:8px;font-size:.82rem;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399}
.alert-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
.alert-warning{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fbbf24}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#60a5fa}

/* CHATBOT */
.chatbot-fab{position:fixed;bottom:80px;right:20px;z-index:80;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;cursor:pointer;box-shadow:0 8px 24px rgba(59,130,246,.4);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all .2s}
.chatbot-fab:hover{transform:scale(1.1)}
.chatbot-window{position:fixed;bottom:140px;right:20px;z-index:80;width:360px;max-height:480px;background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:14px 16px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:space-between}
.chat-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;max-height:320px}
.chat-msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:.8rem;line-height:1.5}
.chat-msg.user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-msg.ai{background:var(--bg3);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Poppins',sans-serif;font-size:.82rem}
.chat-input:focus{outline:none;border-color:var(--blue)}
.chat-send{background:var(--blue);border:none;border-radius:8px;color:#fff;padding:8px 12px;cursor:pointer;transition:.2s}
.chat-send:hover{background:#2563eb}

/* MOBILE BOTTOM NAV */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:60}
.mobile-nav-inner{display:flex;align-items:center;justify-content:space-around;height:60px;padding:0 8px}
.mobile-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--text3);cursor:pointer;padding:4px;font-family:'Poppins',sans-serif;border-top:3px solid transparent;transition:all .2s}
.mobile-nav-btn.active{color:var(--blue);border-top-color:var(--blue)}
.mobile-nav-btn span{font-size:.62rem;font-weight:600}

/* SETUP WIZARD */
.wizard-step{display:none}
.wizard-step.active{display:block}
.wizard-progress{display:flex;gap:8px;margin-bottom:24px}
.wizard-dot{width:30px;height:6px;border-radius:3px;background:var(--bg3);transition:.3s}
.wizard-dot.done{background:var(--blue)}

/* RESPONSIVE */
@media(max-width:768px){
  .login-inner{grid-template-columns:1fr}
  .login-left{display:none}
  .pos-grid{grid-template-columns:1fr}
  .pos-cart{order:-1}
  .mobile-nav{display:flex}
  .main{padding:12px;padding-bottom:80px}
  .header-title{font-size:1.1rem}
  .tab-nav{display:none}
  .metrics-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .metrics-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}

/* SPINNER */
.spinner{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* PULSE */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.animate-pulse{animation:pulse 2s infinite}

/* LOADING SCREEN */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===== STATE MANAGEMENT =====
const STORAGE_KEY = 'fuelpro_data';

const defaultState = {
  theme: 'dark',
  isLoggedIn: false,
  hasSubscription: true, // Demo: skip paywall
  companyName: 'My Fuel Station',
  companyContacts: '',
  companyEmail: '',
  companyPoBox: '',
  companyLogo: '',
  currency: 'Ksh',
  pmsPrice: 180,
  agoPrice: 170,
  pmsTankClosing: 4200,
  agoTankClosing: 6800,
  pmsTankOpening: 5000,
  agoTankOpening: 8000,
  shift: 'Day',
  salesDate: new Date().toISOString().split('T')[0],
  pmsPumps: [],
  agoPumps: [],
  expenses: [],
  tillPayment: 0,
  invoiceItems: [],
  invoiceCounter: 1,
  clients: {},
  invoices: {},
  debtHistory: {},
  salesHistory: {},
  deliveryRows: [],
  offloadingRecords: [],
  employees: [],
  payrollRecords: [],
  mpesaTransactions: [],
  stations: [{id:'main', name:'Main Station', location:'Nairobi'}],
  currentStation: 'main',
  posTransactions: [],
  chatHistory: []
};

let state = {...defaultState};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) state = {...defaultState, ...JSON.parse(saved)};
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

loadState();

// ===== ROUTER / RENDERING =====
let currentTab = 'dashboard';
let chatOpen = false;

function render() {
  const app = document.getElementById('app');
  if(!state.isLoggedIn) {
    app.innerHTML = renderLogin();
    attachLoginEvents();
    return;
  }
  app.innerHTML = `
    ${renderHeader()}
    ${renderTabNav()}
    <div class="main">
      ${renderTabContent()}
    </div>
    ${renderMobileNav()}
    ${renderChatbot()}
  `;
  attachMainEvents();
}

// ===== TAB CONTENT =====
function renderTabContent() {
  switch(currentTab) {
    case 'dashboard': return renderDashboard();
    case 'pos': return renderPOS();
    case 'sales': return renderSalesTracking();
    case 'delivery': return renderDelivery();
    case 'offloading': return renderOffloading();
    case 'invoice': return renderInvoice();
    case 'debt': return renderDebtReminder();
    case 'reports': return renderReports();
    case 'fuelsalesreport': return renderFuelSalesReport();
    case 'mpesa': return renderMPESA();
    case 'livetransaction': return renderLiveTransaction();
    case 'payroll': return renderPayroll();
    case 'communication': return renderCommunication();
    case 'documents': return renderDocuments();
    case 'data': return renderDataManager();
    default: return renderDashboard();
  }
}

// ===== DASHBOARD =====
function renderDashboard() {
  const pmsRev = state.pmsPumps.reduce((s,p)=>s+(p.salesKsh||0),0);
  const agoRev = state.agoPumps.reduce((s,p)=>s+(p.salesKsh||0),0);
  const totalRev = pmsRev + agoRev;
  const pmsL = state.pmsPumps.reduce((s,p)=>s+(p.salesL||0),0);
  const agoL = state.agoPumps.reduce((s,p)=>s+(p.salesL||0),0);
  const totalL = pmsL + agoL;
  const totalExp = state.expenses.reduce((s,e)=>s+e.amount,0);
  const netProfit = totalRev - totalExp;
  const totalClients = Object.keys(state.clients).length;
  const totalInvoices = Object.keys(state.invoices).length;
  const pmsPct = Math.min((state.pmsTankClosing/10000)*100,100).toFixed(0);
  const agoPct = Math.min((state.agoTankClosing/10000)*100,100).toFixed(0);

  const salesArr = Object.entries(state.salesHistory).map(([k,d])=>{
    const data = d;
    const pr = (data.pmsPumps||[]).reduce((s,p)=>s+(p.salesKsh||0),0);
    const ar = (data.agoPumps||[]).reduce((s,p)=>s+(p.salesKsh||0),0);
    return {date:data.date||k.split('_')[0], total:pr+ar};
  }).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,7);

  const maxRev = Math.max(...salesArr.map(d=>d.total),1);

  const clientsDebt = Object.entries(state.clients).filter(([_,d])=>(d.balance||0)>0).map(([n,d])=>({name:n,bal:d.balance||0})).sort((a,b)=>b.bal-a.bal).slice(0,5);

  const quickActions = [
    {icon:'🛒',label:'Quick Sale',desc:'Process POS',tab:'pos',color:'#3b82f6'},
    {icon:'⛽',label:'Record Sales',desc:'Enter readings',tab:'sales',color:'#10b981'},
    {icon:'🚛',label:'Fuel Delivery',desc:'Log offloading',tab:'offloading',color:'#f59e0b'},
    {icon:'📄',label:'Create Invoice',desc:'Bill a customer',tab:'invoice',color:'#8b5cf6'},
    {icon:'💳',label:'Record Payment',desc:'Track payment',tab:'delivery',color:'#14b8a6'},
    {icon:'📱',label:'M-PESA Analysis',desc:'Analyze statements',tab:'mpesa',color:'#059669'},
  ];

  const now = new Date();
  const timeStr = now.toLocaleTimeString();
  const dateStr = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  return `
  <div style="max-width:1200px">
    <!-- Hero -->
    <div style="background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);border-radius:16px;padding:28px;margin-bottom:24px;border:1px solid rgba(59,130,246,.2);box-shadow:0 8px 32px rgba(0,0,0,.4)">
      <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:16px">
        <div>
          <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#fff;display:flex;align-items:center;gap:10px">
            ⛽ ${state.companyName || 'FuelPro Station'}
          </h1>
          <p style="color:#93c5fd;margin-top:4px">Professional Fuel Management System</p>
          <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px">
            <span style="padding:4px 12px;background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);border-radius:100px;font-size:.75rem;color:#93c5fd">📅 ${state.salesDate}</span>
            <span style="padding:4px 12px;background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.4);border-radius:100px;font-size:.75rem;color:#6ee7b7">🌤️ ${state.shift} Shift</span>
            <span style="padding:4px 12px;background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);border-radius:100px;font-size:.75rem;color:#fbbf24">👤 ${totalClients} Clients</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:1.8rem;font-weight:700;font-family:monospace;color:#fff" id="live-clock">${timeStr}</div>
          <div style="font-size:.78rem;color:#93c5fd;margin-top:4px">📅 ${dateStr}</div>
        </div>
      </div>
    </div>

    <!-- Metrics -->
    <div class="metrics-grid">
      <div class="metric-card mc-green">
        <div class="metric-title">Today's Revenue</div>
        <div class="metric-value">${fmt(totalRev,0)}</div>
        <div class="metric-sub">${state.currency}</div>
        <div class="metric-footer"><span>PMS: ${fmt(pmsRev,0)}</span><span>AGO: ${fmt(agoRev,0)}</span></div>
      </div>
      <div class="metric-card mc-blue">
        <div class="metric-title">Fuel Sold</div>
        <div class="metric-value">${fmt(totalL,0)}</div>
        <div class="metric-sub">Litres</div>
        <div class="metric-footer"><span>PMS: ${fmt(pmsL,0)}L</span><span>AGO: ${fmt(agoL,0)}L</span></div>
      </div>
      <div class="metric-card ${netProfit>=0?'mc-teal':'mc-red'}">
        <div class="metric-title">Net ${netProfit>=0?'Profit':'Loss'}</div>
        <div class="metric-value">${fmt(Math.abs(netProfit),0)}</div>
        <div class="metric-sub">${state.currency}</div>
        <div class="metric-footer"><span>Expenses: ${fmt(totalExp,0)}</span></div>
      </div>
      <div class="metric-card ${clientsDebt.length>0?'mc-amber':'mc-gray'}">
        <div class="metric-title">Outstanding Debt</div>
        <div class="metric-value">${clientsDebt.length}</div>

    </div>

    <!-- Mid row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px">
      <!-- Tank Levels -->
      <div class="card">
        <div class="card-header"><div class="card-title">💧 Tank Levels</div></div>
        <div style="margin-bottom:20px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-weight:600;color:#34d399;display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;background:#10b981;border-radius:50%;display:inline-block"></span>PMS (Petrol)</span>
            <strong>${fmt(state.pmsTankClosing)} L</strong>
          </div>
          <div class="tank-bar">
            <div class="tank-fill" style="width:${pmsPct}%;background:${+pmsPct<20?'#ef4444':+pmsPct<40?'#f59e0b':'#10b981'}"></div>
            <div class="tank-label">${pmsPct}%</div>
          </div>
          ${+pmsPct<30?`<div style="font-size:.72rem;color:#fbbf24;margin-top:4px">⚠️ Low stock — consider reordering</div>`:''}
        </div>
        <div style="margin-bottom:20px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-weight:600;color:#fbbf24;display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;background:#f59e0b;border-radius:50%;display:inline-block"></span>AGO (Diesel)</span>

          ${+agoPct<30?`<div style="font-size:.72rem;color:#fbbf24;margin-top:4px">⚠️ Low stock — consider reordering</div>`:''}
        </div>
        <div style="border-top:1px solid var(--border);padding-top:16px">
          <div style="font-size:.78rem;color:var(--text3);margin-bottom:8px">Current Prices</div>
          <div style="display:flex;gap:12px">
            <div style="flex:1;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:12px;text-align:center">
              <div style="font-size:.72rem;color:#34d399">PMS</div>
              <div style="font-size:1.2rem;font-weight:700;color:#6ee7b7">${state.currency} ${state.pmsPrice}</div>
            </div>
            <div style="flex:1;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:12px;text-align:center">
              <div style="font-size:.72rem;color:#fbbf24">AGO</div>

      </div>

      <!-- 7-Day Trend -->
      <div class="card">
        <div class="card-header"><div class="card-title">📊 7-Day Sales Trend</div></div>
        ${salesArr.length>0 ? `
          ${salesArr.map(d=>{
            const w=(d.total/maxRev*100).toFixed(0);
            const dayStr = (() => { try { return new Date(d.date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric'}); } catch(e){return d.date;} })();

// ===== POS =====
function renderPOS() {
  const cart = state._cart || [];
  const subtotal = cart.reduce((s,i)=>s+(i.total||0),0);
  const vat = subtotal * 0.16;
  const total = subtotal + vat;

  return `
  <div>
    <div class="card-header" style="margin-bottom:16px">
      <div class="section-title">🛒 Point of Sale</div>

// ===== SALES TRACKING =====

        <div class="form-group"><label class="form-label">PMS Closing (L)</label><input type="number" class="form-input" id="pms-tank-close" value="${state.pmsTankClosing}"/></div>

      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Pump</th><th>Opening (Ksh)</th><th>Closing (Ksh)</th><th>Opening (L)</th><th>Closing (L)</th><th>Sales (L)</th><th>Sales (Ksh)</th><th></th></tr></thead>

          <tbody id="ago-pumps-body">
            ${state.agoPumps.map((p,i)=>`
              <tr>
                <td><strong>AGO ${i+1}</strong></td>
                <td><input class="td-input" type="number" value="${p.openingKsh||0}" onchange="updatePump('ago',${i},'openingKsh',this.value)"/></td>

              </tr>
            `).join('')}
            ${state.agoPumps.length===0?`<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:20px">No AGO pumps. Click "Add Pump" to begin.</td></tr>`:''}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Expenses -->
    <div class="card" style="margin-bottom:20px">

        </div>
      `).join('')}
      ${state.expenses.length===0?`<div style="color:var(--text3);font-size:.82rem;padding:8px 0">No expenses recorded today.</div>`:''}
    </div>

    <!-- Summary -->
    <div class="card">
      <div class="card-header"><div class="card-title">📋 Day Summary</div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px">
        ${[
          {label:'PMS Revenue',val:fmt(pmsRev,2),color:'#34d399'},
          {label:'AGO Revenue',val:fmt(agoRev,2),color:'#fbbf24'},
          {label:'Total Revenue',val:fmt(totalRev,2),color:'#60a5fa'},
          {label:'Total Expenses',val:fmt(totalExp,2),color:'#f87171'},
          {label:'Net Profit',val:fmt(totalRev-totalExp,2),color:totalRev-totalExp>=0?'#34d399':'#f87171'},

          <div style="font-size:.72rem;color:var(--text3);margin-bottom:4px">${s.label}</div>
          <div style="font-size:1.1rem;font-weight:700;color:${s.color}">${state.currency} ${s.val}</div>
        </div>`).join('')}
      </div>
      <div class="form-group" style="margin-top:16px">
        <label class="form-label">Till Payment (${state.currency})</label>
        <input type="number" class="form-input" id="till-payment" value="${state.tillPayment}" style="max-width:200px"/>
      </div>
    </div>
  </div>`;
}

// ===== DELIVERY TRACKER =====
function renderDelivery() {
  const rows = state.deliveryRows || [];
  const totalSupplied = rows.filter(r=>r.reg!=='PAYMENT').reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const totalPayments = rows.filter(r=>r.reg==='PAYMENT').reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
  const balanceDue = totalSupplied - totalPayments;

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div class="section-title">🚛 Delivery Tracker</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" id="add-delivery-row-btn">+ Add Row</button>
        <button class="btn btn-secondary btn-sm" id="add-payment-row-btn">+ Payment</button>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Reg No.</th><th>Fuel Type</th><th>Litres</th><th>Amount (${state.currency})</th><th>Name</th><th>Balance/Debt</th><th></th></tr></thead>
          <tbody id="delivery-body">
            ${rows.map((r,i)=>`
              <tr style="${r.reg==='PAYMENT'?'background:rgba(16,185,129,.05)':''}">
                <td><input class="td-input" value="${r.date||''}" placeholder="Date" onchange="updateDeliveryRow(${i},'date',this.value)"/></td>
                <td><input class="td-input" value="${r.reg||''}" placeholder="Reg No." onchange="updateDeliveryRow(${i},'reg',this.value)" style="${r.reg==='PAYMENT'?'color:#34d399;font-weight:700':''}"/></td>
                <td><input class="td-input" value="${r.fuel||''}" placeholder="PMS/AGO" onchange="updateDeliveryRow(${i},'fuel',this.value)"/></td>
                <td><input class="td-input" type="number" value="${r.litres||0}" onchange="updateDeliveryRow(${i},'litres',this.value)"/></td>
                <td><input class="td-input" type="number" value="${r.amount||0}" onchange="updateDeliveryRow(${i},'amount',this.value)"/></td>
                <td><input class="td-input" value="${r.name||''}" placeholder="Customer" onchange="updateDeliveryRow(${i},'name',this.value)"/></td>
                <td><input class="td-input" type="number" value="${r.debt||0}" onchange="updateDeliveryRow(${i},'debt',this.value)"/></td>
                <td><button class="btn btn-danger btn-sm" onclick="removeDeliveryRow(${i})">🗑️</button></td>
              </tr>
            `).join('')}
            ${rows.length===0?`<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:30px">No deliveries recorded. Add rows to begin.</td></tr>`:''}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Totals -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px">
      <div class="metric-card mc-blue"><div class="metric-title">Total Supplied</div><div class="metric-value" style="font-size:1.4rem">${fmt(totalSupplied,2)}</div><div class="metric-sub">${state.currency}</div></div>
      <div class="metric-card mc-green"><div class="metric-title">Total Payments</div><div class="metric-value" style="font-size:1.4rem">${fmt(totalPayments,2)}</div><div class="metric-sub">${state.currency}</div></div>
      <div class="metric-card ${balanceDue>0?'mc-amber':'mc-teal'}"><div class="metric-title">Balance Due</div><div class="metric-value" style="font-size:1.4rem">${fmt(balanceDue,2)}</div><div class="metric-sub">${state.currency}</div></div>
    </div>
  </div>`;
}

// ===== REPORTS CENTER =====
function renderReports() {
  const pmsRev = state.pmsPumps.reduce((s,p)=>s+(p.salesKsh||0),0);
  const agoRev = state.agoPumps.reduce((s,p)=>s+(p.salesKsh||0),0);
  const totalRev = pmsRev + agoRev;
  const totalExp = state.expenses.reduce((s,e)=>s+e.amount,0);
  const salesCount = Object.keys(state.salesHistory).length;
  const monthlyRev = Object.values(state.salesHistory).reduce((s,d)=>{
    const pr = (d.pmsPumps||[]).reduce((a,p)=>a+(p.salesKsh||0),0);
    const ar = (d.agoPumps||[]).reduce((a,p)=>a+(p.salesKsh||0),0);
    return s+pr+ar;
  },0);

  return `
  <div>
    <div class="section-title" style="margin-bottom:20px">📈 Reports Center</div>
    <div class="metrics-grid" style="margin-bottom:24px">

      <div class="metric-card mc-green"><div class="metric-title">Monthly Revenue</div><div class="metric-value">${fmt(monthlyRev,0)}</div><div class="metric-sub">${state.currency} (all records)</div></div>
      <div class="metric-card mc-amber"><div class="metric-title">Total Expenses</div><div class="metric-value">${fmt(totalExp,0)}</div><div class="metric-sub">${state.currency}</div></div>
      <div class="metric-card mc-purple"><div class="metric-title">Sales Records</div><div class="metric-value">${salesCount}</div><div class="metric-sub">Saved shifts</div></div>
    </div>

    <!-- Sales History -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><div class="card-title">📅 Sales History</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Shift</th><th>PMS (${state.currency})</th><th>AGO (${state.currency})</th><th>Total (${state.currency})</th><th>Expenses</th><th>Net Profit</th></tr></thead>
          <tbody>
            ${Object.entries(state.salesHistory).length===0?`<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:30px">No records yet. Save daily sales from Sales Tracking.</td></tr>`:
            Object.entries(state.salesHistory).sort(([a],[b])=>b.localeCompare(a)).slice(0,20).map(([k,d])=>{
              const pr=(d.pmsPumps||[]).reduce((s,p)=>s+(p.salesKsh||0),0);
              const ar=(d.agoPumps||[]).reduce((s,p)=>s+(p.salesKsh||0),0);
              const exp=(d.expenses||[]).reduce((s,e)=>s+e.amount,0);
              const tr=pr+ar;
              const np=tr-exp;
              return `<tr>
                <td>${d.date||k.split('_')[0]}</td>
                <td><span class="badge badge-blue">${d.shift||'Day'}</span></td>
                <td>${fmt(pr,2)}</td><td>${fmt(ar,2)}</td>
                <td style="font-weight:700;color:#60a5fa">${fmt(tr,2)}</td>
                <td style="color:#f87171">${fmt(exp,2)}</td>
                <td style="font-weight:700;color:${np>=0?'#34d399':'#f87171'}">${fmt(np,2)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Expense Breakdown -->
    <div class="card">
      <div class="card-header"><div class="card-title">💸 Today's Expenses</div></div>
      ${state.expenses.length===0?`<div style="text-align:center;padding:20px;color:var(--text3)">No expenses today.</div>`:
      `<div class="table-wrap"><table><thead><tr><th>Description</th><th>Amount (${state.currency})</th></tr></thead><tbody>

      </tbody></table></div>`}
    </div>

}

// ===== FUEL SALES REPORT =====
function renderFuelSalesReport() {
  const monthlyData = {};
  Object.entries(state.salesHistory).forEach(([k,d])=>{
    const month = (d.date||k.split('_')[0]).substring(0,7);
    if(!monthlyData[month]) monthlyData[month]={pms:0,ago:0,total:0,days:0};
    monthlyData[month].pms+=(d.pmsPumps||[]).reduce((s,p)=>s+(p.salesKsh||0),0);
    monthlyData[month].ago+=(d.agoPumps||[]).reduce((s,p)=>s+(p.salesKsh||0),0);
    monthlyData[month].total+=monthlyData[month].pms+monthlyData[month].ago;
    monthlyData[month].days++;
  });

  return `
  <div>
    <div class="section-title" style="margin-bottom:20px">📋 Fuel Sales Report</div>
    <div class="card">
      <div class="card-header"><div class="card-title">📅 Monthly Summary</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Month</th><th>PMS (${state.currency})</th><th>AGO (${state.currency})</th><th>Total (${state.currency})</th><th>Days Recorded</th></tr></thead>
          <tbody>
            ${Object.entries(monthlyData).length===0?`<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:30px">No monthly data available.</td></tr>`:
            Object.entries(monthlyData).sort(([a],[b])=>b.localeCompare(a)).map(([m,d])=>`<tr>
              <td style="font-weight:600">${m}</td>
              <td style="color:#34d399">${fmt(d.pms,2)}</td>
              <td style="color:#fbbf24">${fmt(d.ago,2)}</td>
              <td style="font-weight:700;color:#60a5fa">${fmt(d.pms+d.ago,2)}</td>
              <td>${d.days}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function fmt(n, dec=2) {
  return new Intl.NumberFormat('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n||0);
}

function switchTab(tab) {
  currentTab = tab;
  render();
  window.scrollTo(0,0);
}

function toggleChat() {
  chatOpen = !chatOpen;
  const w = document.getElementById('chat-window');
  if(w) w.style.display = chatOpen ? 'flex' : 'none';
  if(chatOpen) {
    w.style.flexDirection = 'column';
    document.getElementById('chat-input')?.focus();
  }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input?.value.trim();
  if(!msg) return;
  input.value = '';

  const body = document.getElementById('chat-body');
  const userDiv = document.createElement('div');
  userDiv.className='chat-msg user';
  userDiv.textContent=msg;
  body.appendChild(userDiv);

  const aiDiv = document.createElement('div');
  aiDiv.className='chat-msg ai';
  aiDiv.textContent='Thinking...';
  body.appendChild(aiDiv);
  body.scrollTop=body.scrollHeight;

  try {
    const context = `You are FuelPro AI, an assistant for a fuel station management system in Kenya. 
    Current data: Company: ${state.companyName}, PMS Price: ${state.pmsPrice} ${state.currency}/L, AGO Price: ${state.agoPrice} ${state.currency}/L, 
    PMS Revenue today: ${state.pmsPumps.reduce((s,p)=>s+(p.salesKsh||0),0)} ${state.currency},
    AGO Revenue today: ${state.agoPumps.reduce((s,p)=>s+(p.salesKsh||0),0)} ${state.currency},
    Clients: ${Object.keys(state.clients).length}, Invoices: ${Object.keys(state.invoices).length}.
    Be concise and helpful. Answer in 2-3 sentences max.`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        system: context,
        messages:[{role:'user',content:msg}]
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || "I'm here to help with your fuel station operations!";
    aiDiv.textContent = reply;
    state.chatHistory.push({id:Date.now().toString(),message:msg,response:reply,timestamp:new Date().toISOString()});
    if(state.chatHistory.length>50) state.chatHistory=state.chatHistory.slice(-50);
    saveState();
  } catch(e) {
    aiDiv.textContent = "I can help with sales analysis, invoice questions, pump readings, and any FuelPro feature. What would you like to know?";
  }
  body.scrollTop=body.scrollHeight;
}

function attachMainEvents() {
  // Tab navigation
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', ()=>switchTab(btn.dataset.tab));
  });

  // Header buttons
  document.getElementById('theme-btn')?.addEventListener('click', ()=>{
    state.theme = state.theme==='dark'?'light':'dark';
    saveState();
    render();
  });
  document.getElementById('settings-btn')?.addEventListener('click', showSettingsModal);
  document.getElementById('logout-btn')?.addEventListener('click', ()=>{
    if(confirm('Are you sure you want to logout?')) {
      state.isLoggedIn = false;
      saveState();
      render();
    }
  });

  // Chat
  document.getElementById('chat-fab')?.addEventListener('click', toggleChat);

  // Live clock
  setInterval(()=>{
    const el=document.getElementById('live-clock');
    if(el) el.textContent=new Date().toLocaleTimeString();
  },1000);

  // ===== Sales Tab Events =====
  document.getElementById('save-sales-btn')?.addEventListener('click', ()=>{
    const date = document.getElementById('sales-date')?.value || state.salesDate;
    const shift = document.getElementById('sales-shift')?.value || state.shift;
    const key = `${date}_${shift}_${Date.now()}`;
    state.salesDate = date;
    state.shift = shift;
    state.pmsPrice = parseFloat(document.getElementById('pms-price')?.value)||state.pmsPrice;
    state.agoPrice = parseFloat(document.getElementById('ago-price')?.value)||state.agoPrice;
    state.pmsTankOpening = parseFloat(document.getElementById('pms-tank-open')?.value)||0;
    state.pmsTankClosing = parseFloat(document.getElementById('pms-tank-close')?.value)||0;
    state.agoTankOpening = parseFloat(document.getElementById('ago-tank-open')?.value)||0;
    state.agoTankClosing = parseFloat(document.getElementById('ago-tank-close')?.value)||0;
    state.tillPayment = parseFloat(document.getElementById('till-payment')?.value)||0;
    state.salesHistory[key] = {
      date, shift,
      pmsPumps:[...state.pmsPumps],
      agoPumps:[...state.agoPumps],
      expenses:[...state.expenses],
      tillPayment:state.tillPayment
    };
    saveState();
    alert(`Sales saved for ${date} (${shift} shift)!`);
    render();
  });

  document.getElementById('add-pms-pump')?.addEventListener('click', ()=>{
    state.pmsPumps.push({id:'pms_'+Date.now(),openingKsh:0,closingKsh:0,openingL:0,closingL:0,salesL:0,salesKsh:0});
    saveState(); render();
  });
  document.getElementById('add-ago-pump')?.addEventListener('click', ()=>{
    state.agoPumps.push({id:'ago_'+Date.now(),openingKsh:0,closingKsh:0,openingL:0,closingL:0,salesL:0,salesKsh:0});
    saveState(); render();
  });

  document.getElementById('add-expense-btn')?.addEventListener('click', ()=>{
    state.expenses.push({desc:'',amount:0});
    saveState(); render();
  });

  // ===== Delivery Events =====
  document.getElementById('add-delivery-row-btn')?.addEventListener('click', ()=>{
    state.deliveryRows.push({date:state.salesDate,reg:'',fuel:'PMS',litres:0,amount:0,name:'',debt:0});
    saveState(); render();
  });
  document.getElementById('add-payment-row-btn')?.addEventListener('click', ()=>{
    state.deliveryRows.push({date:state.salesDate,reg:'PAYMENT',fuel:'',litres:0,amount:0,name:'',debt:0});
    saveState(); render();
  });

  // ===== Offloading Events =====
  document.getElementById('save-offloading-btn')?.addEventListener('click', ()=>{
    const qty = parseFloat(document.getElementById('off-qty')?.value)||0;
    const rate = parseFloat(document.getElementById('off-rate')?.value)||0;
    const record = {
      id:'off_'+Date.now(),
      date:document.getElementById('off-date')?.value,
      time:document.getElementById('off-time')?.value,
      truckReg:document.getElementById('off-truck')?.value,
      driverName:document.getElementById('off-driver')?.value,
      fuelType:document.getElementById('off-fuel')?.value,
      quantity:qty, rate:rate, totalAmount:qty*rate,
      supplier:document.getElementById('off-supplier')?.value,
      invoiceNo:document.getElementById('off-invoice')?.value,
      remarks:document.getElementById('off-remarks')?.value
    };
    if(!record.truckReg) return alert('Please enter truck registration');
    state.offloadingRecords.push(record);
    saveState(); render();
  });

  // ===== Invoice Events =====
  document.getElementById('add-invoice-item-btn')?.addEventListener('click', ()=>{
    state.invoiceItems.push({desc:'',qty:1,price:0,total:0});
    saveState(); render();
  });
  document.getElementById('save-invoice-btn')?.addEventListener('click', ()=>{

    if(!customer || state.invoiceItems.length===0) return alert('Add customer and at least one item');
    const invNo = `INV-${new Date().getFullYear()}-${String(state.invoiceCounter).padStart(3,'0')}`;
    state.invoices[invNo] = {
      customer:{name:customer,address:document.getElementById('inv-address')?.value,phone:document.getElementById('inv-phone')?.value},
      date:document.getElementById('inv-date')?.value,
      items:[...state.invoiceItems],
      totalAmount:state.invoiceItems.reduce((s,i)=>s+i.total,0)
    };
    state.invoiceCounter++;
    state.invoiceItems=[];
    saveState(); alert(`Invoice ${invNo} saved!`); render();
  });

  // ===== Debt Reminder Events =====
  document.getElementById('save-debt-btn')?.addEventListener('click', ()=>{
    const name = document.getElementById('debt-customer')?.value.trim();
    if(!name) return alert('Enter customer name');
    const key = `${new Date().toISOString().split('T')[0]}_${name.replace(/\s+/g,'_')}`;
    state.debtHistory[key]={
      name,amount:document.getElementById('debt-amount')?.value,
      till:document.getElementById('debt-till')?.value,
      bank:document.getElementById('debt-bank')?.value,
      acName:document.getElementById('debt-acname')?.value,
      acNo:document.getElementById('debt-acno')?.value,
      contact:document.getElementById('debt-wa')?.value,
      manager:document.getElementById('debt-manager')?.value,
      method:document.getElementById('debt-method')?.value

    saveState(); alert(`Reminder for ${name} saved!`); render();
  });
  document.getElementById('clear-debt-btn')?.addEventListener('click', ()=>{
    ['debt-customer','debt-amount','debt-till','debt-bank','debt-acname','debt-acno','debt-wa','debt-manager'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  });
  document.getElementById('debt-send-wa')?.addEventListener('click', ()=>{

    const amount=document.getElementById('debt-amount')?.value||'0';
    const till=document.getElementById('debt-till')?.value||'[Till]';
    const wa=document.getElementById('debt-wa')?.value||'';
    const manager=document.getElementById('debt-manager')?.value||'[Manager]';

    const url=`https://wa.me/${wa.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`;
    window.open(url,'_blank');
  });
  document.getElementById('debt-send-email')?.addEventListener('click', ()=>{
    const name=document.getElementById('debt-customer')?.value||'[Customer]';
    const amount=document.getElementById('debt-amount')?.value||'0';
    const till=document.getElementById('debt-till')?.value||'[Till]';
    const manager=document.getElementById('debt-manager')?.value||'[Manager]';
    const body=`Dear ${name},\n\nThis is a gentle reminder that ${state.currency} ${amount} for fuel supplied remains unpaid.\n\nKindly settle via Till No: ${till}\n\nThank you.\n${manager}\n${state.companyName}`;
    window.location.href=`mailto:?subject=${encodeURIComponent('Fuel Debt Reminder')}&body=${encodeURIComponent(body)}`;
  });

  // Debt preview
  ['debt-customer','debt-amount','debt-till','debt-bank','debt-acname','debt-acno','debt-wa','debt-manager'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input', updateDebtPreview);
  });

  // ===== MPESA Events =====
  document.getElementById('parse-mpesa-btn')?.addEventListener('click', ()=>{
    const text = document.getElementById('mpesa-text')?.value||'';
    const parsed = parseMpesaText(text);
    if(parsed.length===0) return alert('No transactions found. Check the format.');
    state.mpesaTransactions = [...state.mpesaTransactions,...parsed];
    saveState(); render();
  });
  document.getElementById('clear-mpesa-btn')?.addEventListener('click', ()=>{
    if(confirm('Clear all M-PESA transactions?')) {
      state.mpesaTransactions=[];
      saveState(); render();
    }
  });

  // ===== POS Events =====
  document.getElementById('pos-add-fuel-btn')?.addEventListener('click', ()=>{
    const fuelType = document.getElementById('pos-fuel-type')?.value;
    const litres = parseFloat(document.getElementById('pos-litres')?.value)||0;
    if(litres<=0) return alert('Enter valid litres amount');
    const price = fuelType==='pms'?state.pmsPrice:state.agoPrice;
    const name = fuelType==='pms'?'Super Petrol (PMS)':'Diesel (AGO)';
    if(!state._cart) state._cart=[];
    state._cart.push({id:'fuel_'+Date.now(),name,qty:litres,unitPrice:price,total:litres*price,fuelType});
    document.getElementById('pos-litres').value='';
    saveState(); render();
  });
  document.getElementById('pos-add-item-btn')?.addEventListener('click', ()=>{
    const name = document.getElementById('pos-item-name')?.value.trim();
    const price = parseFloat(document.getElementById('pos-item-price')?.value)||0;
    if(!name||price<=0) return alert('Enter item name and price');
    if(!state._cart) state._cart=[];
    state._cart.push({id:'item_'+Date.now(),name,qty:1,unitPrice:price,total:price});
    document.getElementById('pos-item-name').value='';
    document.getElementById('pos-item-price').value='';
    saveState(); render();
  });
  document.getElementById('pos-clear-cart')?.addEventListener('click', ()=>{
    state._cart=[];
    saveState(); render();
  });
  document.getElementById('pos-checkout-btn')?.addEventListener('click', ()=>{
    if(!state._cart||state._cart.length===0) return;
    const cart=state._cart;
    const subtotal=cart.reduce((s,i)=>s+(i.total||0),0);
    const vat=subtotal*0.16;
    const total=subtotal+vat;
    const method=document.getElementById('pos-payment')?.value||'cash';
    const customer=document.getElementById('pos-customer')?.value||'Walk-in';
    const txn={
      id:'pos_'+Date.now(),
      receiptNo:'FP'+Date.now().toString().slice(-8),
      items:[...cart],subtotal,vat,total,
      method,customer,
      time:new Date().toLocaleTimeString()
    };
    state.posTransactions.push(txn);
    state._cart=[];
    saveState();
    alert(`✅ Payment of ${state.currency} ${fmt(total,2)} processed!\nReceipt: ${txn.receiptNo}`);
    render();
  });

  // ===== Payroll =====
  document.getElementById('add-employee-btn')?.addEventListener('click', ()=>showEmployeeModal(null,-1));
  document.getElementById('add-employee-btn2')?.addEventListener('click', ()=>showEmployeeModal(null,-1));

  // ===== Communication =====
  document.getElementById('add-client-btn')?.addEventListener('click', showClientModal);

  // ===== Data Manager =====
  document.getElementById('export-backup-btn')?.addEventListener('click', ()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`fuelpro-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();URL.revokeObjectURL(url);
  });
  document.getElementById('import-backup-input')?.addEventListener('change', (e)=>{
    const file=e.target.files?.[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try {
        const data=JSON.parse(ev.target.result);
        Object.assign(state,data);
        state.isLoggedIn=true;
        saveState();
        alert('Backup restored!');
        render();
      } catch(err) { alert('Invalid backup file.'); }
    };
    reader.readAsText(file);
  });
  document.getElementById('clear-sales-btn')?.addEventListener('click', ()=>{
    if(confirm('Clear all sales history? This cannot be undone.')) {
      state.salesHistory={};
      saveState(); render();
    }
  });
  document.getElementById('clear-invoices-btn')?.addEventListener('click', ()=>{
    if(confirm('Clear all invoices?')) {
      state.invoices={};
      saveState(); render();
    }
  });
  document.getElementById('reset-all-btn')?.addEventListener('click', ()=>{
    if(confirm('⚠️ RESET ALL DATA? This will wipe everything. Are you absolutely sure?')) {
      if(confirm('This action cannot be undone. Last chance!')) {
        localStorage.removeItem(STORAGE_KEY);
        state={...defaultState,isLoggedIn:true};
        saveState(); render();
      }
    }
  });
}

// ===== GLOBAL FUNCTIONS (called from inline HTML) =====
window.switchTab = switchTab;

window.saveClient = saveClient;

window.updatePump = function(type, idx, field, value) {
  const pumps = type==='pms'?state.pmsPumps:state.agoPumps;
  pumps[idx][field] = parseFloat(value)||0;
  const p = pumps[idx];
  p.salesKsh = (p.closingKsh||0) - (p.openingKsh||0);
  p.salesL = (p.closingL||0) - (p.openingL||0);
  saveState();
};

window.removePump = function(type, idx) {
  if(type==='pms') state.pmsPumps.splice(idx,1);
  else state.agoPumps.splice(idx,1);
  saveState(); render();
};

window.updateExpense = function(idx, field, value) {
  state.expenses[idx][field] = field==='amount'?parseFloat(value)||0:value;
  saveState();
};

window.removeExpense = function(idx) {
  state.expenses.splice(idx,1);
  saveState(); render();
};

window.updateDeliveryRow = function(idx, field, value) {
  if(!state.deliveryRows[idx]) return;
  state.deliveryRows[idx][field] = ['litres','amount','debt'].includes(field)?parseFloat(value)||0:value;
  saveState();
};

window.removeDeliveryRow = function(idx) {

  saveState(); render();
};

window.deleteOffloading = function(idx) {
  if(confirm('Delete this record?')) {
    state.offloadingRecords.splice(idx,1);
    saveState(); render();
  }
};

window.updateInvItem = function(idx, field, value) {
  const items = state.invoiceItems;
  items[idx][field] = ['qty','price'].includes(field)?parseFloat(value)||0:value;
  items[idx].total = (items[idx].qty||0)*(items[idx].price||0);

};

window.removeInvItem = function(idx) {

};

window.deleteInvoice = function(key) {

    delete state.invoices[key];
    saveState(); render();
  }
};

window.loadDebt = function(key) {
  const d = state.debtHistory[key];
  if(!d) return;
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val||'';};
  set('debt-customer',d.name); set('debt-amount',d.amount); set('debt-till',d.till);
  set('debt-bank',d.bank); set('debt-acname',d.acName); set('debt-acno',d.acNo);
  set('debt-wa',d.contact); set('debt-manager',d.manager);

window.deleteDebt = function(key) {
  if(confirm('Delete this reminder?')) {
    delete state.debtHistory[key];
    saveState(); render();
  }
};

window.editEmployee = function(idx) {
  showEmployeeModal(state.employees[idx],idx);
};

window.deleteEmployee = function(idx) {
  if(confirm('Remove this employee?')) {
    state.employees.splice(idx,1);
    saveState(); render();
  }
};

window.deleteClient = function(name) {
  if(confirm(`Remove client "${name}"?`)) {
    delete state.clients[name];
    saveState(); render();
  }
};

window.posQty = function(idx, delta) {
  if(!state._cart||!state._cart[idx]) return;
  const item = state._cart[idx];
  item.qty = Math.max(0.1, (item.qty||1)+delta);
  item.total = item.qty * item.unitPrice;
  if(item.qty<=0) state._cart.splice(idx,1);
  saveState(); render();
};

window.posRemove = function(idx) {
  if(!state._cart) return;
  state._cart.splice(idx,1);
  saveState(); render();
};

function parseMpesaText(text) {
  const txns = [];
  // Match M-PESA SMS patterns
  const patterns = [
    /([A-Z0-9]{10,})\s+Confirmed\.\s+(?:You have received|Ksh)([\d,]+\.?\d*)\s+(?:from|paid to)\s+(.+?)(?:on\s+([\d\/]+))?/gi,
    /([A-Z0-9]{10,})\s+Confirmed\.\s+Ksh([\d,]+\.?\d*)\s+sent to\s+(.+?)(?:on\s+([\d\/]+))?/gi,
  ];
  let match;
  for(const pattern of patterns) {
    while((match=pattern.exec(text))!==null) {
      const amount = parseFloat(match[2].replace(/,/g,''));
      txns.push({
        id:'mpesa_'+Date.now()+'_'+txns.length,
        reference:match[1],
        amount: match[0].includes('received')||match[0].includes('from') ? amount : -amount,
        description: match[3]?.trim(),
        date: match[4]||new Date().toLocaleDateString(),
        balance: 0
      });
    }
  }
  // Fallback: simple line-by-line
  if(txns.length===0) {
    const lines = text.split('\n').filter(l=>l.trim());
    lines.forEach((line,i)=>{
      const amtMatch=line.match(/Ksh([\d,]+\.?\d*)/i);
      const refMatch=line.match(/([A-Z0-9]{8,})/);
      if(amtMatch) txns.push({
        id:'mpesa_'+Date.now()+'_'+i,
        reference:refMatch?refMatch[1]:'TXN'+i,
        amount:parseFloat(amtMatch[1].replace(/,/g,'')),
        description:line.replace(/Ksh[\d,\.]+/i,'').trim().slice(0,80),
        date:new Date().toLocaleDateString(),
        balance:0
      });
    });
  }
  return txns;
}
