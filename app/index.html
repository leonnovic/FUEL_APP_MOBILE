  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Preload critical assets for faster rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Force color scheme for older browsers -->
    <meta name="color-scheme" content="light dark" />
    <meta property="og:title" content="FuelPro - Fuel Management System" />
    <meta
      property="og:description"
      content="Professional fuel distribution and payment management system"
    />
    <meta
      property="og:image"
      content="https://mocha-cdn.com/0199d39d-8fc8-7b37-bf10-097a162ee9f3/QRRR.jpg"
      type="image/jpeg"
    />
    <meta property="og:url" content="https://fuelpro.mocha.app" />
    <meta property="og:type" content="website" />
    <meta property="og:author" content="FuelPro" />
    <meta property="og:site_name" content="FuelPro - Fuel Management System" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:site" content="@get_mocha" />
    <meta property="twitter:title" content="FuelPro - Fuel Management System" />
    <meta
      property="twitter:description"
      content="Professional fuel distribution and payment management system"
    />
    <meta
      property="twitter:image"
      content="https://mocha-cdn.com/0199d39d-8fc8-7b37-bf10-097a162ee9f3/QRRR.jpg"
      type="image/jpeg"
    />
    <link rel="shortcut icon" href="/logo-small.png" type="image/png" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/logo-main.png"
      type="image/png"
    />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="FuelPro" />
    <meta name="msapplication-TileImage" content="/logo-main.png" />
    <meta name="msapplication-TileColor" content="#f59e0b" />
    <title>FuelPro - Fuel Management System</title>
    <!-- Prevent FOUC (Flash of Unstyled Content) - Apply theme BEFORE React loads -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('fuelpro_theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = theme === 'dark' || (theme === 'system' && prefersDark) || (!theme && prefersDark);
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
            document.body.style.colorScheme = 'dark';
          } else {
            document.documentElement.classList.add('light');
            document.documentElement.setAttribute('data-theme', 'light');
            document.body.style.colorScheme = 'light';
          }
        } catch(e) {}
      })();
    </script>
    <style>
      /* Critical CSS - Prevent flash of white background in dark mode */
      html.dark { background-color: #1a1a1a; }
      html.light { background-color: #ffffff; }
      @media (prefers-color-scheme: dark) {
        html:not(.light):not(.dark) { background-color: #1a1a1a; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/react-app/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
