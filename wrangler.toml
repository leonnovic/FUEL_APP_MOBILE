# Cloudflare Workers + Static Assets config for FuelPro SPA
# Deployed via .github/workflows/cloudflare-deploy.yml (cloudflare/wrangler-action)
name = "fuelappmobile"
main = "frontend/src/worker/index.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "frontend/dist"
not_found_handling = "single-page-application"

[build]
# Use npm ci (lockfile-reproducible) and skip binary-only packages that
# time-out or fail in Cloudflare's build VMs (Electron, Puppeteer, etc.)
command = "cd frontend && ELECTRON_SKIP_BINARY_DOWNLOAD=1 ELECTRON_BUILDER_SKIP_PUBLISH=1 PUPPETEER_SKIP_DOWNLOAD=1 npm ci --legacy-peer-deps && npm run build"
