# Cloudflare Workers + Static Assets config for FuelPro SPA
# Deployed via .github/workflows/cloudflare-deploy.yml (cloudflare/wrangler-action)
name = "fuelappmobile"
main = "frontend/src/worker/index.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "frontend/dist"
not_found_handling = "single-page-application"

[build]
# build-cloudflare.sh exports the skip-binary env vars before npm ci,
# avoiding the inline KEY=val syntax that Cloudflare pre-validates strictly.
command = "sh build-cloudflare.sh"
